# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Test and build backend

on:
  pull_request:
    branches: [ "**" ]

# Least-privilege default; the two test jobs opt into `checks: write` so
# dorny/test-reporter can post results as a check run.
permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - name: Check Changed Files 👀
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'

  build:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4

      - name: Check Changed Files 👀
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Install dependencies
        run: go mod download
        working-directory: ./backend

      - name: Ensure dependencies are up-to-date
        run: go mod tidy
        working-directory: ./backend

      - name: Build

        run: go build -v ./...
        working-directory: ./backend

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Test all packages except internal/repository
        run: |
          gotestsum --format testname --junitfile report.xml -- -timeout 30m $(go list ./... | grep -v './internal/repository')
        working-directory: ./backend
        timeout-minutes: 30

      - name: Report test results
        # Pinned to the v3.0.0 commit SHA (supply-chain hardening); bump deliberately.
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: success() || failure()
        with:
          name: Go tests (non-repository)
          path: backend/report.xml
          reporter: java-junit


  test-repository:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Tidy and Install dependencies
        run: |
          go mod tidy
          go mod download
        working-directory: ./backend
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0
      - name: Test internal/repository
        run: gotestsum --format testname --junitfile report.xml -- -timeout 30m ./internal/repository/...
        working-directory: ./backend
        timeout-minutes: 30

      - name: Report test results
        # Pinned to the v3.0.0 commit SHA (supply-chain hardening); bump deliberately.
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: success() || failure()
        with:
          name: Go tests (repository)
          path: backend/report.xml
          reporter: java-junit

  golangci-lint:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: go mod download
        working-directory: ./backend
      - name: Ensure dependencies are up-to-date
        run: go mod tidy
        working-directory: ./backend
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
          working-directory: backend

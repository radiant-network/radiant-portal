# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Test and build backend

on:
  pull_request:
    branches: [ "**" ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - name: Check Changed Files 👀
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Changed Files 👀
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'

      - name: Set up Go
        if: steps.filter.outputs.backend == 'true'
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'

      - name: Install dependencies
        if: steps.filter.outputs.backend == 'true'
        run: go mod download
        working-directory: ./backend

      - name: Ensure dependencies are up-to-date
        if: steps.filter.outputs.backend == 'true'
        run: go mod tidy
        working-directory: ./backend

      - name: Build
        if: steps.filter.outputs.backend == 'true'
        run: go build -v ./...
        working-directory: ./backend

  test-repository:
    needs: [changes, build]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Install dependencies
        run: go mod download
        working-directory: ./backend
      - name: Test internal/repository
        run: go test -timeout 30m ./internal/repository/...
        working-directory: ./backend
        timeout-minutes: 30

  test-api:
    needs: [changes, build]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Install dependencies
        run: go mod download
        working-directory: ./backend
      - name: Test cmd/api
        run: go test -timeout 30m ./cmd/api/...
        working-directory: ./backend
        timeout-minutes: 30

  test-other:
    needs: [changes, build]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Install dependencies
        run: go mod download
        working-directory: ./backend
      - name: Test remaining packages
        run: |
          go test -timeout 30m $(go list ./... | grep -v './internal/repository' | grep -v './cmd/api')
        working-directory: ./backend
        timeout-minutes: 30

services:
  starrocks:
    image: starrocks/allin1-ubuntu:3.4.2
    container_name: starrocks_radiant
    ports:
      - "9030:9030"
      - "8030:8030"
      - "8040:8040"
    healthcheck:
      test: >
        curl -sf http://localhost:8030/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:14
    container_name: postgres_radiant
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: radiant
      POSTGRES_USER: radiant
      POSTGRES_DB: radiant
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radiant"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    volumes:
      - ./scripts/init-keycloak:/opt/keycloak/data/import
    environment:
        KC_LOG_LEVEL: info
        KC_METRICS_ENABLED: 'true'
        KC_HEALTH_ENABLED: 'true'
        KEYCLOAK_ADMIN: admin
        KEYCLOAK_ADMIN_PASSWORD: admin
    command: ["start-dev", "--import-realm", "--http-enabled=true", "--hostname-strict=false"]
    healthcheck:
      test: ['CMD-SHELL', '[ -f /tmp/HealthCheck.java ] || echo "public class HealthCheck { public static void main(String[] args) throws java.lang.Throwable { System.exit(java.net.HttpURLConnection.HTTP_OK == ((java.net.HttpURLConnection)new java.net.URL(args[0]).openConnection()).getResponseCode() ? 0 : 1); } }" > /tmp/HealthCheck.java && java /tmp/HealthCheck.java http://localhost:9000/health/live']
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "8080:8080"
      - "9000:9000"

  # Standalone Postgres standing in for the external/managed DB that backs Ranger in production.
  # In prod this container is dropped and Ranger points at the managed endpoint (see
  # scripts/ranger/install.properties -> db_host).
  ranger-db:
    image: postgres:14
    container_name: ranger-db
    hostname: ranger-db
    environment:
      POSTGRES_PASSWORD: rangerR0cks!   # superuser "postgres" -- Ranger's bootstrap (db_root) account
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 30

  # Apache Ranger admin. DB connection is externalized via the mounted install.properties so the
  # same setup mirrors a production install against an external Postgres (edit that file for prod).
  # No Solr/ZooKeeper: audit shipping is a no-op and the admin still boots.
  ranger:
    image: apache/ranger:2.7.0
    container_name: ranger
    hostname: ranger
    depends_on:
      ranger-db:
        condition: service_healthy
    environment:
      RANGER_VERSION: "2.7.0"
      RANGER_DB_TYPE: postgres
    volumes:
      - ./scripts/ranger/install.properties:/opt/ranger/admin/install.properties
      # Replaces the stock script (which creates demo dev_* services) -- registers only our StarRocks service.
      - ./scripts/ranger/create-ranger-services.py:/home/ranger/scripts/create-ranger-services.py
      - ./scripts/ranger/ranger-servicedef-starrocks.json:/home/ranger/scripts/ranger-servicedef-starrocks.json
    command: ["/home/ranger/scripts/ranger.sh"]
    ports:
      - "6080:6080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6080/login.jsp > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: api.Dockerfile
    container_name: radiant-api
    ports:
      - "8090:8090"
    environment:
      DB_USERNAME: root
      DB_PASSWORD:
      DB_HOST: starrocks
      DB_PORT: 9030
      DB_NAME: test_db
      PGUSER: radiant
      PGPASSWORD: radiant
      PGPORT: 5432
      PGHOST: postgres
      PGDATABASE: radiant
      PGSSLMODE: disable
      CORS_ALLOWED_ORIGINS: '*'
      KEYCLOAK_HOST: http://keycloak:8080
      KEYCLOAK_REALM: CQDG
      KEYCLOAK_CLIENT: radiant
      KEYCLOAK_CLIENT_ROLE: radiant
      AWS_ACCESS_KEY_ID: access
      AWS_SECRET_ACCESS_KEY: secret
      PUBMED_BASE_URL: https://api.ncbi.nlm.nih.gov
    depends_on:
      init-schema:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker.Dockerfile
    container_name: radiant-worker
    ports:
      - "9999:9999"
    environment:
      PGUSER: radiant
      PGPASSWORD: radiant
      PGPORT: 5432
      PGHOST: postgres
      PGDATABASE: radiant
      PGSSLMODE: disable
    depends_on:
      init-schema:
        condition: service_completed_successfully
      postgres-clinical-data:
        condition: service_completed_successfully

  init-schema:
    image: starrocks/allin1-ubuntu
    container_name: init-schema
    depends_on:
      starrocks:
        condition: service_healthy
    volumes:
      - ./scripts/init-sql:/docker-entrypoint-initdb.d
    entrypoint: >
      /bin/bash -c "sleep 10 && 
      mysql -hstarrocks -P9030 -uroot < /docker-entrypoint-initdb.d/init_starrocks.sql;"

  postgres-clinical-data:
    image: postgres
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./scripts/init-sql:/docker-entrypoint-initdb.d
    entrypoint: [ "sh", "-c" ]
    command:
      - -c
      - |
        export PGPASSWORD='radiant'; sleep 10 && psql -h postgres -U radiant -d radiant -f /docker-entrypoint-initdb.d/insert_clinical_data.sql;

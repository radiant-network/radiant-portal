# The Ranger image + Helm chart now live in their own repo (radiant-network/ranger-starrocks). The
# local-dev stack here runs the published image in its 3 phases via ranger-compose.yml. `include`
# merges it into this project, so cross-file networking (e.g. ranger-register -> starrocks below) works.
# If you don't need Ranger locally, comment out the include below.
include:
  - ranger-compose.yml

services:
  # Run-once: generate the self-signed cert + JKS keystore/truststore + PEM into the
  # shared `starrocks-certs` volume that StarRocks and every StarRocks client mounts.
  # Idempotent (skips if the keystore already exists). Uses a JDK image purely for
  # `keytool`. See starrocks-conf/certs/generate-certs.sh.
  cert-init:
    image: eclipse-temurin:21-jdk
    container_name: starrocks-cert-init
    restart: "no"
    volumes:
      - starrocks-certs:/certs
      - ./starrocks-conf/certs/generate-certs.sh:/generate-certs.sh:ro
    entrypoint: ["bash", "/generate-certs.sh"]

  starrocks:
    image: starrocks/allin1-ubuntu:3.5.17
    container_name: starrocks_radiant
    ports:
      - "9030:9030"
      - "8030:8030"
      - "8040:8040"
    volumes:
      - ./starrocks-conf/ranger-starrocks-security.xml:/data/deploy/starrocks/fe/conf/ranger-starrocks-security.xml
      - ./starrocks-conf/ranger-starrocks-audit.xml:/data/deploy/starrocks/fe/conf/ranger-starrocks-audit.xml
      - ./starrocks-conf/fe.conf:/data/deploy/starrocks/fe/conf/fe.conf
      # SSL keystore (read by fe.conf: ssl_keystore_location=/data/deploy/certs/...)
      - starrocks-certs:/data/deploy/certs:ro
    depends_on:
      cert-init:
        condition: service_completed_successfully
    healthcheck:
      test: >
        curl -sf http://localhost:8030/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:14
    container_name: postgres_radiant
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: radiant
      POSTGRES_USER: radiant
      POSTGRES_DB: radiant
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radiant"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    volumes:
      - ../scripts/init-keycloak:/opt/keycloak/data/import
    environment:
      KC_LOG_LEVEL: info
      KC_METRICS_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command:
      [
        "start-dev",
        "--import-realm",
        "--http-enabled=true",
        "--hostname-strict=false",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '[ -f /tmp/HealthCheck.java ] || echo "public class HealthCheck { public static void main(String[] args) throws java.lang.Throwable { System.exit(java.net.HttpURLConnection.HTTP_OK == ((java.net.HttpURLConnection)new java.net.URL(args[0]).openConnection()).getResponseCode() ? 0 : 1); } }" > /tmp/HealthCheck.java && java /tmp/HealthCheck.java http://localhost:9000/health/live',
        ]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "8080:8080"
      - "9000:9000"

  api:
    build:
      context: ../
      dockerfile: api.Dockerfile
    container_name: radiant-api
    ports:
      - "8090:8090"
    volumes:
      # CA bundle (the self-signed StarRocks cert) for the Go MySQL driver TLS.
      - starrocks-certs:/certs:ro
    environment:
      DB_USERNAME: root
      DB_PASSWORD:
      DB_HOST: starrocks
      DB_PORT: 9030
      DB_NAME: test_db
      # Enables TLS to StarRocks (internal/database/starrocks.go reads this CA).
      DB_SSL_CA: /certs/starrocks_cert.pem
      PGUSER: radiant
      PGPASSWORD: radiant
      PGPORT: 5432
      PGHOST: postgres
      PGDATABASE: radiant
      PGSSLMODE: disable
      CORS_ALLOWED_ORIGINS: "*"
      KEYCLOAK_HOST: http://keycloak:8080
      KEYCLOAK_REALM: CQDG
      KEYCLOAK_CLIENT: radiant
      AWS_ACCESS_KEY_ID: access
      AWS_SECRET_ACCESS_KEY: secret
      PUBMED_BASE_URL: https://api.ncbi.nlm.nih.gov
    depends_on:
      init-schema:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  worker:
    build:
      context: ../
      dockerfile: worker.Dockerfile
    container_name: radiant-worker
    ports:
      - "9999:9999"
    environment:
      PGUSER: radiant
      PGPASSWORD: radiant
      PGPORT: 5432
      PGHOST: postgres
      PGDATABASE: radiant
      PGSSLMODE: disable
    depends_on:
      init-schema:
        condition: service_completed_successfully
      postgres-clinical-data:
        condition: service_completed_successfully

  init-schema:
    image: starrocks/allin1-ubuntu
    container_name: init-schema
    depends_on:
      starrocks:
        condition: service_healthy
    volumes:
      - ../scripts/init-sql:/docker-entrypoint-initdb.d
      # CA bundle for the mysql client's --ssl-ca below.
      - starrocks-certs:/certs:ro
    entrypoint: >
      /bin/bash -c "sleep 10 &&
      mysql -hstarrocks -P9030 -uroot --ssl-mode=VERIFY_CA --ssl-ca=/certs/starrocks_cert.pem < /docker-entrypoint-initdb.d/init_starrocks.sql;"

  postgres-clinical-data:
    image: postgres
    depends_on:
      api:
        condition: service_started
    volumes:
      - ../scripts/init-sql:/docker-entrypoint-initdb.d
    entrypoint: ["sh", "-c"]
    command:
      - -c
      - |
        export PGPASSWORD='radiant'; sleep 10 && psql -h postgres -U radiant -d radiant -f /docker-entrypoint-initdb.d/insert_clinical_data.sql;

# Shared volume holding the StarRocks SSL artifacts (keystore.jks, cert.pem,
# truststore.jks) produced by the cert-init service and mounted into StarRocks
# and every StarRocks client (api, init-schema, ranger).
volumes:
  starrocks-certs:

# Ranger stack, included by ../docker-compose.yml. Co-located with the image it builds (Dockerfile,
# entrypoint, scripts, baked StarRocks JSON in this same directory). Paths here are relative to this
# file, so build.context is "." (backend/ranger). `include` merges these into the same Compose project,
# so depends_on / networking with the services in the parent file (e.g. starrocks) works transparently.
services:
  # Postgres backing Ranger. In production this is an external/managed instance; here it stands in.
  # It pre-creates the database + the runtime role so the image runs in SeparateDBA mode (no superuser
  # at runtime). The host is passed to the image via RANGER_DB_HOST, so the name is no longer fixed.
  ranger-db:
    image: postgres:14
    container_name: ranger-db
    hostname: ranger-db
    environment:
      POSTGRES_USER: rangeradmin # runtime DB role Ranger connects as (owns the Ranger tables)
      POSTGRES_PASSWORD: rangerR0cks!
      POSTGRES_DB: ranger # database pre-created for SeparateDBA (no create-db at runtime)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rangeradmin -d ranger"]
      interval: 10s
      timeout: 5s
      retries: 30

  # ----------------------------------------------------------------------------------------------------
  # Apache Ranger, split into the 3 phases that mirror the production k8s topology. All three run the
  # SAME self-contained image (./Dockerfile: dual-mode admin + baked StarRocks plugin jars and
  # service-def/instance JSON), picking a phase via the mode argument (migrate / serve / register). The
  # image is built once, on ranger-migrate -- the root of the depends_on chain -- and reused by the
  # other two as `image: ranger-dual-mode`.
  #
  # The split exists to separate secrets by phase:
  #   - migrate  : DB creds + ALL Ranger account passwords (it writes them into the DB, once).
  #   - serve    : ONLY DB creds -- NO Ranger user passwords (web-user auth is resolved against the DB).
  #   - register : the admin password + StarRocks connection creds -- NO DB creds.
  # In k8s: migrate = pre-deploy Job, serve = Deployment, register = post-deploy Job.
  # ----------------------------------------------------------------------------------------------------

  # Phase 1 (run-once): create/patch the Ranger schema (SeparateDBA) and set the account passwords in
  # the DB, then exit 0. Holds every account password; nothing long-running depends on it staying up.
  ranger-migrate:
    build:
      context: .
    image: ranger-dual-mode
    container_name: ranger-migrate
    command: ["migrate"]
    restart: "no"
    depends_on:
      ranger-db:
        condition: service_healthy
    environment:
      RANGER_DB_HOST: ranger-db
      RANGER_DB_NAME: ranger
      RANGER_DB_USER: rangeradmin
      RANGER_DB_PASSWORD: rangerR0cks!
      RANGER_DB_ROOT_USER: rangeradmin # unused under SeparateDBA; set = runtime creds
      RANGER_DB_ROOT_PASSWORD: rangerR0cks!
      # Account passwords (>=8 chars, upper+lower+digit) -- written to the DB by setup.sh, once.
      RANGER_ADMIN_PASSWORD: rangerR0cks!
      RANGER_KEYADMIN_PASSWORD: rangerR0cks!
      RANGER_TAGSYNC_PASSWORD: rangerR0cks!
      RANGER_USERSYNC_PASSWORD: rangerR0cks!

  # Phase 2 (long-running): the admin server. Runs with ONLY DB credentials -- no Ranger user passwords
  # (auth is resolved against the DB that migrate populated). RANGER_REGISTER_ON_SERVE=false delegates
  # service registration to the separate register phase below.
  ranger:
    image: ranger-dual-mode
    container_name: ranger
    hostname: ranger
    command: ["serve"]
    depends_on:
      ranger-db:
        condition: service_healthy
      ranger-migrate:
        condition: service_completed_successfully
    environment:
      RANGER_DB_HOST: ranger-db
      RANGER_DB_NAME: ranger
      RANGER_DB_USER: rangeradmin
      RANGER_DB_PASSWORD: rangerR0cks!
      RANGER_REGISTER_ON_SERVE: "false"
      # External admin URL advertised in config (not the bind address); match the service hostname.
      RANGER_POLICYMGR_EXTERNAL_URL: http://ranger:6080
    ports:
      - "6080:6080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:6080/login.jsp > /dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 60s

  # Phase 3 (run-once, after serve is healthy): register the StarRocks service-def + service against the
  # running admin via its REST API. Holds the admin password + StarRocks connection creds; NO DB creds.
  # Idempotent (service-def create-or-update, service create-only), so it is safe to re-run.
  ranger-register:
    image: ranger-dual-mode
    container_name: ranger-register
    command: ["register"]
    restart: "no"
    depends_on:
      ranger:
        condition: service_healthy
    environment:
      RANGER_ADMIN_URL: http://ranger:6080
      RANGER_ADMIN_USER: admin
      RANGER_ADMIN_PASSWORD: rangerR0cks!
      # StarRocks service-instance connection (substituted into the baked starrocks-service.json).
      # allin1 root has no password -> empty.
      RANGER_STARROCKS_USERNAME: root
      RANGER_STARROCKS_PASSWORD: ""
      RANGER_STARROCKS_JDBC_URL: jdbc:mysql://starrocks:9030
      RANGER_STARROCKS_SERVICE_NAME: starrocks_test
      # yes -> service-def implClass = RangerServiceStarRocks (UI Test Connection / autocomplete).
      RANGER_STARROCKS_AUTOCOMPLETE: "yes"
